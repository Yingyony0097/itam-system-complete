server {
    listen 80;
    server_name itam.click www.itam.click;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name itam.click www.itam.click;

    ssl_certificate /etc/letsencrypt/live/itam.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/itam.click/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Block hidden files/directories (except ACME challenge path)
    location ~ /\.(?!well-known/) {
        return 403;
    }

    # Block deployment/repository files and database scripts
    location ~* ^/(?:docker-compose(?:\.prod)?\.yml|Dockerfile|deploy\.sh|README\.md|sql(?:/|$)|\.git(?:/|$)) {
        return 403;
    }

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
