services:
  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: itam_system
      DB_USER: itam_user
      DB_PASS: itam_password
    depends_on:
      - db
    command: >
      bash -lc "mkdir -p public/uploads/assets
      && chown -R www-data:www-data public/uploads 2>/dev/null || true
      && chmod -R 775 public/uploads 2>/dev/null || true
      && apache2-foreground"

  db:
    restart: unless-stopped
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: itam_system
      MYSQL_USER: itam_user
      MYSQL_PASSWORD: itam_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"

volumes:
  mysql_data:
