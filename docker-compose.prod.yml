services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_CHARSET: ${DB_CHARSET}
      APP_ENV: ${APP_ENV}
    depends_on:
      - db
    command: >
      bash -lc "mkdir -p public/uploads/assets public/uploads/photos
      && chown -R www-data:www-data public/uploads 2>/dev/null || true
      && chmod -R 775 public/uploads 2>/dev/null || true
      && apache2-foreground"

  db:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: itam-system-mysql:8.4.8-secure
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      # Mount SQL files in deterministic order for first-time initialization.
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/add_profile_fields.sql:/docker-entrypoint-initdb.d/02_add_profile_fields.sql:ro
      - ./sql/add_search_indexes.sql:/docker-entrypoint-initdb.d/03_add_search_indexes.sql:ro
      - ./sql/zz_limit_privileges.sql:/docker-entrypoint-initdb.d/99_limit_privileges.sql:ro

volumes:
  mysql_data:
